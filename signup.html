<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - NeverMiss AI</title>
<link rel="stylesheet" href="styles.css">
<style>
.auth-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0a0a0a;
}
.auth-box {
  background: #111;
  border: 1px solid #1a3a2a;
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 400px;
}
.auth-logo {
  text-align: center;
  margin-bottom: 30px;
}
.auth-logo h1 {
  color: #00c853;
  font-size: 24px;
}
.auth-title {
  color: white;
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
  text-align: center;
}
.auth-subtitle {
  color: #666;
  text-align: center;
  margin-bottom: 30px;
}
.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  color: #ccc;
  margin-bottom: 8px;
  font-size: 14px;
}
.form-group input {
  width: 100%;
  padding: 12px 16px;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 8px;
  color: white;
  font-size: 16px;
  box-sizing: border-box;
}
.form-group input:focus {
  outline: none;
  border-color: #00c853;
}
.btn-primary {
  width: 100%;
  padding: 14px;
  background: #00c853;
  color: #000;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 10px;
}
.btn-primary:hover {
  background: #00a846;
}
.auth-footer {
  text-align: center;
  margin-top: 20px;
  color: #666;
}
.auth-footer a {
  color: #00c853;
  text-decoration: none;
}
</style>
</head>
<body>
<div class="auth-container">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>🟢 NeverMiss AI</h1>
    </div>
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-subtitle">Login to your dashboard</p>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@business.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn-primary" onclick="login()">Login to Dashboard</button>
    <div class="auth-footer">
      <p>Don't have an account? <a href="signup.html">Sign up free</a></p>
    </div>
  </div>
</div>
<script>
function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  if (!email || !password) {
    alert('Please fill in all fields!');
    return;
  }
  const users = JSON.parse(localStorage.getItem('users') || '[]');
  const user = users.find(u => u.email === email && u.password === password);
  if (user) {
    localStorage.setItem('currentUser', JSON.stringify(user));
    window.location.href = 'dashboard.html';
  } else {
    alert('Invalid email or password!');
  }
}
</script>
</body>
</html>
