<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - CallZap ⚡</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: white; font-family: sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.auth-box {
  background: #111;
  border: 1px solid #1a3a2a;
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 400px;
  margin: 24px;
}
.auth-logo { text-align: center; margin-bottom: 28px; }
.auth-logo h1 { color: #00c853; font-size: 28px; font-weight: 900; }
.auth-title { color: white; font-size: 26px; font-weight: 800; margin-bottom: 6px; text-align: center; }
.auth-subtitle { color: #666; text-align: center; margin-bottom: 28px; font-size: 14px; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; color: #888; margin-bottom: 6px; font-size: 13px; }
.form-group input {
  width: 100%; padding: 13px 16px;
  background: #1a1a1a; border: 1px solid #333;
  border-radius: 8px; color: white; font-size: 15px;
  outline: none; box-sizing: border-box;
}
.form-group input:focus { border-color: #00c853; }
.btn-primary {
  width: 100%; padding: 14px;
  background: #00c853; color: #000;
  border: none; border-radius: 8px;
  font-size: 16px; font-weight: 800;
  cursor: pointer; margin-top: 8px;
}
.btn-primary:hover { background: #00a846; }
.auth-footer { text-align: center; margin-top: 20px; color: #666; font-size: 14px; }
.auth-footer a { color: #00c853; text-decoration: none; }
.trial-note {
  background: #0a2a1a;
  border: 1px solid #00c853;
  border-radius: 8px;
  padding: 12px;
  text-align: center;
  color: #00c853;
  font-size: 13px;
  margin-bottom: 24px;
}
</style>
</head>
<body>
<div class="auth-box">
  <div class="auth-logo">
    <h1>CallZap ⚡</h1>
  </div>
  <h2 class="auth-title">Get Started Free</h2>
  <p class="auth-subtitle">Start recovering missed clients today!</p>
  <div class="trial-note">
    ⚡ 7-day free trial • No credit card required
  </div>
  <div class="form-group">
    <label>Business Name</label>
    <input type="text" id="business" placeholder="Your Business Name">
  </div>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@business.com">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>
  <button class="btn-primary" onclick="signup()">Start Free Trial ⚡</button>
  <div class="auth-footer">
    <p>Already have an account? <a href="login.html">Login</a></p>
  </div>
</div>
<script>
function signup() {
  const business = document.getElementById('business').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  if (!business || !email || !password) { alert('Please fill in all fields!'); return; }
  const users = JSON.parse(localStorage.getItem('users') || '[]');
  const exists = users.find(u => u.email === email);
  if (exists) { alert('Email already registered! Please login.'); return; }
  const newUser = { business, email, password };
  users.push(newUser);
  localStorage.setItem('users', JSON.stringify(users));
  localStorage.setItem('currentUser', JSON.stringify(newUser));
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
